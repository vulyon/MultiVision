<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiVision - Multimodal Visual Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            padding: 20px 40px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #333;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #888; margin-top: 4px; }

        .container {
            display: flex;
            min-height: calc(100vh - 80px);
        }
        .sidebar {
            width: 260px;
            padding: 20px;
            background: #1a1a2e;
            border-right: 1px solid #333;
        }
        .section { margin-bottom: 25px; }
        .section h3 {
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .btn {
            padding: 12px 16px;
            background: #252540;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 14px;
        }
        .btn:hover { background: #2d2d4a; }
        .btn.active {
            background: linear-gradient(135deg, #00d4ff20, #7c3aed20);
            border-color: #00d4ff;
        }

        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            gap: 20px;
        }
        .panel {
            flex: 1;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }
        .panel h3 {
            color: #888;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 8px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .upload-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .upload-area p { color: #666; }
        .upload-area img, .upload-area video {
            max-width: 100%;
            max-height: 350px;
            border-radius: 8px;
        }

        .camera-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .camera-area video {
            width: 100%;
            max-width: 450px;
            border-radius: 8px;
            background: #000;
        }
        .camera-btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .camera-btn.start {
            background: linear-gradient(135deg, #00d4ff, #00a8cc);
            color: #000;
        }
        .camera-btn.stop { background: #ff4757; color: #fff; }

        .result-area {
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .result-area img {
            max-width: 100%;
            max-height: 350px;
            border-radius: 8px;
        }
        .result-area pre {
            background: #0f0f0f;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            color: #aaa;
            width: 100%;
        }
        .loading { color: #00d4ff; font-size: 18px; }
        .no-result { color: #666; }

        .style-select {
            padding: 10px;
            background: #252540;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            width: 100%;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MultiVision</h1>
        <p>Multimodal Visual Intelligence Platform</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="section">
                <h3>Model</h3>
                <div class="btn-group">
                    <button class="btn active" data-model="detector">Object Detection</button>
                    <button class="btn" data-model="gesture">Gesture Recognition</button>
                    <button class="btn" data-model="style_transfer">Style Transfer</button>
                    <button class="btn" data-model="action">Action Recognition</button>
                </div>
            </div>

            <div class="section" id="styleSection" style="display: none;">
                <h3>Style</h3>
                <select class="style-select" id="styleSelect">
                    <option value="sketch">Sketch</option>
                    <option value="watercolor">Watercolor</option>
                    <option value="oil">Oil Painting</option>
                    <option value="anime">Anime</option>
                </select>
            </div>

            <div class="section">
                <h3>Input Source</h3>
                <div class="btn-group">
                    <button class="btn active" data-source="image">Image Upload</button>
                    <button class="btn" data-source="video">Video Upload</button>
                    <button class="btn" data-source="camera">Live Camera</button>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="panel">
                <h3>Input</h3>
                <div id="inputArea" class="upload-area">
                    <input type="file" id="fileInput" accept="image/*,video/*">
                    <p>Click or drag to upload</p>
                </div>
            </div>

            <div class="panel">
                <h3>Result</h3>
                <div id="resultArea" class="result-area">
                    <p class="no-result">Upload image or start camera</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentModel = 'detector';
        let currentSource = 'image';
        let currentStyle = 'sketch';
        let cameraActive = false;
        let ws = null;
        let mediaStream = null;

        // DOM elements
        const modelBtns = document.querySelectorAll('[data-model]');
        const sourceBtns = document.querySelectorAll('[data-source]');
        const styleSection = document.getElementById('styleSection');
        const styleSelect = document.getElementById('styleSelect');
        const inputArea = document.getElementById('inputArea');
        const fileInput = document.getElementById('fileInput');
        const resultArea = document.getElementById('resultArea');

        // Model selection
        modelBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modelBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentModel = btn.dataset.model;

                // Show/hide style options
                styleSection.style.display = currentModel === 'style_transfer' ? 'block' : 'none';

                processCurrentInput();
            });
        });

        // Source selection
        sourceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                sourceBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSource = btn.dataset.source;

                setupInputArea();
            });
        });

        // Style selection
        styleSelect.addEventListener('change', () => {
            currentStyle = styleSelect.value;
            processCurrentInput();
        });

        function setupInputArea() {
            stopCamera();

            if (currentSource === 'image') {
                inputArea.innerHTML = '<input type="file" id="fileInput" accept="image/*"><p>Click or drag to upload image</p>';
                setupFileInput();
            } else if (currentSource === 'video') {
                inputArea.innerHTML = '<input type="file" id="fileInput" accept="video/*"><p>Click or drag to upload video</p>';
                setupFileInput();
            } else {
                inputArea.innerHTML = `
                    <div class="camera-area">
                        <video id="cameraVideo" autoplay playsinline></video>
                        <button class="camera-btn start" id="cameraBtn">Start Camera</button>
                    </div>
                `;
                setupCamera();
            }
        }

        function setupFileInput() {
            document.getElementById('fileInput').addEventListener('change', handleFileUpload);
        }

        function setupCamera() {
            const btn = document.getElementById('cameraBtn');
            const video = document.getElementById('cameraVideo');

            btn.addEventListener('click', () => {
                if (!cameraActive) {
                    startCamera();
                } else {
                    stopCamera();
                }
            });
        }

        async function startCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                const video = document.getElementById('cameraVideo');
                video.srcObject = mediaStream;
                cameraActive = true;

                document.getElementById('cameraBtn').textContent = 'Stop Camera';
                document.getElementById('cameraBtn').classList.remove('start');
                document.getElementById('cameraBtn').classList.add('stop');

                // Connect WebSocket
                connectWebSocket();
            } catch (e) {
                alert('Cannot access camera: ' + e.message);
            }
        }

        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            if (ws) {
                ws.close();
                ws = null;
            }
            cameraActive = false;

            const btn = document.getElementById('cameraBtn');
            if (btn) {
                btn.textContent = 'Start Camera';
                btn.classList.remove('stop');
                btn.classList.add('start');
            }
        }

        function connectWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}/ws/camera`);

            ws.onopen = () => {
                ws.send(JSON.stringify({ model: currentModel }));
                captureFrame();
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.success && data.image) {
                    resultArea.innerHTML = `<img src="data:image/jpeg;base64,${data.image}">`;
                } else if (data.action) {
                    resultArea.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            };

            ws.onclose = () => {
                if (cameraActive) setTimeout(connectWebSocket, 1000);
            };
        }

        function captureFrame() {
            if (!cameraActive || !ws || ws.readyState !== WebSocket.OPEN) return;

            const video = document.getElementById('cameraVideo');
            if (video && video.readyState === 4) {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
                ws.send(JSON.stringify({ model: currentModel, frame: base64 }));
            }

            requestAnimationFrame(captureFrame);
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const isVideo = file.type.startsWith('video/');

            if (isVideo) {
                inputArea.innerHTML = `<video src="${URL.createObjectURL(file)}" controls></video>`;
                resultArea.innerHTML = '<p class="loading">Processing video...</p>';

                // For video, send to backend
                const formData = new FormData();
                formData.append('file', file);
                formData.append('model', currentModel);
                if (currentModel === 'style_transfer') {
                    formData.append('style', currentStyle);
                }

                try {
                    const resp = await fetch('/api/infer', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await resp.json();
                    if (data.success) {
                        resultArea.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                    } else {
                        resultArea.innerHTML = `<pre>Error: ${data.error}</pre>`;
                    }
                } catch (err) {
                    resultArea.innerHTML = `<pre>Error: ${err.message}</pre>`;
                }
            } else {
                // Image
                const reader = new FileReader();
                reader.onload = (e) => {
                    inputArea.innerHTML = `<img src="${e.target.result}">`;
                    processImage(e.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        async function processImage(imgData) {
            resultArea.innerHTML = '<p class="loading">Processing...</p>';

            const base64 = imgData.split(',')[1];
            const formData = new FormData();
            formData.append('image', base64);
            formData.append('model', currentModel);
            if (currentModel === 'style_transfer') {
                formData.append('style', currentStyle);
            }

            try {
                const resp = await fetch('/api/infer', {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();

                if (data.success) {
                    if (data.image) {
                        resultArea.innerHTML = `<img src="data:image/jpeg;base64,${data.image}">`;
                    } else {
                        resultArea.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                    }
                } else {
                    resultArea.innerHTML = `<pre>Error: ${data.error}</pre>`;
                }
            } catch (err) {
                resultArea.innerHTML = `<pre>Error: ${err.message}</pre>`;
            }
        }

        function processCurrentInput() {
            // Re-process if there's already an input
            const img = inputArea.querySelector('img');
            if (img) {
                processImage(img.src);
            }
        }

        // Initialize
        setupFileInput();
    </script>
</body>
</html>
